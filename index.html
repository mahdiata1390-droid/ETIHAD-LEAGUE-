<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>لیگ من</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#0B3D2E" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Vazirmatn:wght@400;500;600;700;800&display=swap" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<!-- Firebase (compat SDK, no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  html, body, #root { height: 100%; margin: 0; }
  body { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<!--
  ⚠️ STEP 1: paste your own Firebase config below (see README.md for how to get it)
-->
<script>
  window.FIREBASE_CONFIG = {
    apiKey: "PASTE_YOUR_API_KEY",
    authDomain: "PASTE_YOUR_PROJECT.firebaseapp.com",
    projectId: "PASTE_YOUR_PROJECT_ID",
    storageBucket: "PASTE_YOUR_PROJECT.appspot.com",
    messagingSenderId: "PASTE_YOUR_SENDER_ID",
    appId: "PASTE_YOUR_APP_ID",
  };
  // Which league document to use. Leave as "default" unless you want multiple
  // separate leagues in the same Firebase project.
  window.LEAGUE_ID = "default";
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;
const { Trophy, Swords, Users, Plus, Trash2, Lock, Unlock, X } = lucide;

const display = { fontFamily: "'Teko', sans-serif" };
const body = { fontFamily: "'Vazirmatn', sans-serif" };

const PITCH = "#0B3D2E";
const PITCH_DARK = "#082B20";
const CREAM = "#F5F0E4";
const GOLD = "#E3A23D";
const RED = "#B8452F";
const INK = "#1C2420";
const TEAM_COLORS = ["#B8452F", "#2C6E8C", "#E3A23D", "#5B6E4A", "#7A4E8C", "#B08968"];

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function computeStandings(teams, matches) {
  const table = {};
  teams.forEach((t) => {
    table[t.id] = { id: t.id, name: t.name, color: t.color, played: 0, win: 0, draw: 0, loss: 0, gf: 0, ga: 0, pts: 0 };
  });
  matches.forEach((m) => {
    if (!m.played) return;
    const h = table[m.homeId];
    const a = table[m.awayId];
    if (!h || !a) return;
    h.played++; a.played++;
    h.gf += m.homeScore; h.ga += m.awayScore;
    a.gf += m.awayScore; a.ga += m.homeScore;
    if (m.homeScore > m.awayScore) { h.win++; a.loss++; h.pts += 3; }
    else if (m.homeScore < m.awayScore) { a.win++; h.loss++; a.pts += 3; }
    else { h.draw++; a.draw++; h.pts += 1; a.pts += 1; }
  });
  return Object.values(table).sort((x, y) => {
    if (y.pts !== x.pts) return y.pts - x.pts;
    const dx = x.gf - x.ga, dy = y.gf - y.ga;
    if (dy !== dx) return dy - dx;
    return y.gf - x.gf;
  });
}

// ---- Firebase setup ----
let db = null;
let firebaseError = null;
try {
  if (window.FIREBASE_CONFIG.apiKey.startsWith("PASTE_")) {
    firebaseError = "پیکربندی Firebase هنوز تنظیم نشده (فایل index.html رو ببین)";
  } else {
    const app = firebase.initializeApp(window.FIREBASE_CONFIG);
    db = firebase.firestore(app);
  }
} catch (e) {
  firebaseError = "خطا در اتصال به Firebase: " + e.message;
}

function LeagueApp() {
  const [leagueName, setLeagueName] = useState("لیگ من");
  const [editingName, setEditingName] = useState(false);
  const [teams, setTeams] = useState([]);
  const [matches, setMatches] = useState([]);
  const [pin, setPin] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const [tab, setTab] = useState("standings");
  const [loaded, setLoaded] = useState(false);
  const [error, setError] = useState(firebaseError || "");
  const [pinModal, setPinModal] = useState(null);
  const [pinInput, setPinInput] = useState("");
  const [pinError, setPinError] = useState("");
  const docRef = db ? db.collection("leagues").doc(window.LEAGUE_ID) : null;
  const applyingRemote = useRef(false);

  useEffect(() => {
    if (!docRef) { setLoaded(true); return; }
    const localAdmin = localStorage.getItem("league-admin-unlocked") === "true";
    const unsub = docRef.onSnapshot((snap) => {
      applyingRemote.current = true;
      if (snap.exists) {
        const data = snap.data();
        setLeagueName(data.leagueName || "لیگ من");
        setTeams(data.teams || []);
        setMatches(data.matches || []);
        setPin(data.pin || null);
        if (!data.pin) setPinModal("setup");
        if (data.pin && localAdmin) setIsAdmin(true);
      } else {
        setPinModal("setup");
      }
      setLoaded(true);
    }, (err) => {
      setError("خطا در خواندن داده: " + err.message);
      setLoaded(true);
    });
    return () => unsub();
  }, []);

  async function saveToFirestore(patch) {
    if (!docRef) return;
    try {
      await docRef.set(patch, { merge: true });
      setError("");
    } catch (e) {
      setError("ذخیره‌سازی انجام نشد: " + e.message);
    }
  }

  function updateTeams(next) {
    setTeams(next);
    saveToFirestore({ teams: next });
  }
  function updateMatches(next) {
    setMatches(next);
    saveToFirestore({ matches: next });
  }

  async function submitSetupPin() {
    if (pinInput.trim().length < 4) { setPinError("رمز باید حداقل ۴ رقم باشه"); return; }
    const newPin = pinInput.trim();
    setPin(newPin);
    setIsAdmin(true);
    setPinModal(null);
    setPinInput(""); setPinError("");
    localStorage.setItem("league-admin-unlocked", "true");
    await saveToFirestore({ leagueName, teams, matches, pin: newPin });
  }

  function submitLoginPin() {
    if (pinInput.trim() === pin) {
      setIsAdmin(true);
      setPinModal(null);
      setPinInput(""); setPinError("");
      localStorage.setItem("league-admin-unlocked", "true");
    } else {
      setPinError("رمز اشتباهه");
    }
  }

  const standings = computeStandings(teams, matches);

  function addTeam(name) {
    if (!isAdmin) return;
    const trimmed = name.trim();
    if (!trimmed) return;
    const color = TEAM_COLORS[teams.length % TEAM_COLORS.length];
    updateTeams([...teams, { id: uid(), name: trimmed, color }]);
  }
  function removeTeam(id) {
    if (!isAdmin) return;
    updateTeams(teams.filter((x) => x.id !== id));
    updateMatches(matches.filter((x) => x.homeId !== id && x.awayId !== id));
  }
  function addMatch(homeId, awayId) {
    if (!isAdmin || !homeId || !awayId || homeId === awayId) return;
    updateMatches([...matches, { id: uid(), homeId, awayId, homeScore: 0, awayScore: 0, played: false }]);
  }
  function updateMatch(id, patch) {
    if (!isAdmin) return;
    updateMatches(matches.map((x) => (x.id === id ? { ...x, ...patch } : x)));
  }
  function removeMatch(id) {
    if (!isAdmin) return;
    updateMatches(matches.filter((x) => x.id !== id));
  }
  function saveLeagueName(name) {
    setLeagueName(name);
    saveToFirestore({ leagueName: name });
  }

  return (
    <div dir="rtl" style={{ ...body, background: CREAM, minHeight: "100vh" }} className="flex flex-col relative">
      <div style={{ background: PITCH }} className="px-5 pt-6 pb-5 relative overflow-hidden">
        <div className="absolute inset-0 opacity-[0.07]" style={{ backgroundImage: "repeating-linear-gradient(0deg, transparent, transparent 18px, #fff 18px, #fff 19px)" }} />
        <div className="relative flex items-center gap-2">
          <Trophy size={22} color={GOLD} />
          {editingName && isAdmin ? (
            <input autoFocus value={leagueName} onChange={(e) => setLeagueName(e.target.value)}
              onBlur={() => { setEditingName(false); saveLeagueName(leagueName); }}
              onKeyDown={(e) => e.key === "Enter" && (setEditingName(false), saveLeagueName(leagueName))}
              style={{ ...display, color: CREAM }} className="bg-transparent border-b border-dashed outline-none text-3xl tracking-wide flex-1" />
          ) : (
            <h1 onClick={() => isAdmin && setEditingName(true)} style={{ ...display, color: CREAM }} className="text-3xl tracking-wide leading-none flex-1">{leagueName}</h1>
          )}
          <button onClick={() => { if (!isAdmin) { setPinModal("login"); setPinInput(""); setPinError(""); } }}
            title={isAdmin ? "حالت مدیریت فعاله" : "ورود مدیر"} className="shrink-0" style={{ color: isAdmin ? GOLD : "rgba(245,240,228,0.5)" }}>
            {isAdmin ? <Unlock size={17} /> : <Lock size={17} />}
          </button>
        </div>
        <p style={{ color: "rgba(245,240,228,0.6)" }} className="relative text-xs mt-1">
          {teams.length} تیم · {matches.filter((m) => m.played).length} بازی برگزار شده{!isAdmin && " · فقط نمایش"}
        </p>
      </div>

      <div className="flex-1 px-4 py-4 pb-24">
        {!loaded && <p className="text-sm text-center py-10" style={{ color: "#6B7280" }}>در حال بارگذاری...</p>}
        {loaded && tab === "standings" && <StandingsView standings={standings} />}
        {loaded && tab === "matches" && <MatchesView teams={teams} matches={matches} onAdd={addMatch} onUpdate={updateMatch} onRemove={removeMatch} isAdmin={isAdmin} />}
        {loaded && tab === "teams" && <TeamsView teams={teams} onAdd={addTeam} onRemove={removeTeam} isAdmin={isAdmin} />}
        {error && <p className="text-xs mt-3" style={{ color: RED }}>{error}</p>}
      </div>

      <div style={{ background: PITCH_DARK, borderTop: "1px solid rgba(255,255,255,0.08)" }} className="fixed bottom-0 left-0 right-0 flex justify-around py-2.5 px-2">
        <NavBtn active={tab === "standings"} onClick={() => setTab("standings")} icon={Trophy} label="جدول" />
        <NavBtn active={tab === "matches"} onClick={() => setTab("matches")} icon={Swords} label="بازی‌ها" />
        <NavBtn active={tab === "teams"} onClick={() => setTab("teams")} icon={Users} label="تیم‌ها" />
      </div>

      {pinModal && (
        <div className="fixed inset-0 z-50 flex items-center justify-center px-6" style={{ background: "rgba(8,20,16,0.6)" }}>
          <div className="bg-white rounded-2xl p-5 w-full max-w-sm relative" style={body}>
            {pinModal === "login" && (
              <button onClick={() => setPinModal(null)} className="absolute top-3 left-3" style={{ color: "#9CA3A3" }}><X size={18} /></button>
            )}
            <h2 style={{ ...display, color: PITCH }} className="text-2xl mb-1">{pinModal === "setup" ? "تنظیم رمز مدیریت" : "ورود مدیر"}</h2>
            <p className="text-xs mb-3" style={{ color: "#6B7280" }}>
              {pinModal === "setup" ? "این لیگ به‌صورت مشترک و آنلاینه؛ هرکی لینک رو داشته باشه می‌تونه جدول رو زنده ببینه. یه رمز بذار تا فقط خودت بتونی ویرایش کنی." : "رمز مدیریت رو وارد کن تا بتونی ویرایش کنی."}
            </p>
            <input type="password" inputMode="numeric" autoFocus value={pinInput} onChange={(e) => setPinInput(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && (pinModal === "setup" ? submitSetupPin() : submitLoginPin())}
              placeholder="رمز" className="w-full text-sm rounded-lg px-3 py-2.5 border outline-none mb-2" style={{ borderColor: "rgba(11,61,46,0.2)", background: CREAM }} />
            {pinError && <p className="text-xs mb-2" style={{ color: RED }}>{pinError}</p>}
            <button onClick={() => (pinModal === "setup" ? submitSetupPin() : submitLoginPin())} style={{ background: PITCH, color: GOLD }} className="w-full rounded-lg py-2.5 text-sm font-medium">
              {pinModal === "setup" ? "ذخیره و شروع" : "ورود"}
            </button>
            {pinModal === "login" && (
              <button onClick={() => setPinModal(null)} className="w-full text-center text-xs mt-2" style={{ color: "#9CA3A3" }}>فقط می‌خوام جدول رو ببینم</button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function NavBtn({ active, onClick, icon: Icon, label }) {
  return (
    <button onClick={onClick} className="flex flex-col items-center gap-1 px-5 py-1 rounded-lg transition-colors" style={{ color: active ? GOLD : "rgba(245,240,228,0.5)" }}>
      <Icon size={20} />
      <span style={body} className="text-[11px] font-medium">{label}</span>
    </button>
  );
}

function StandingsView({ standings }) {
  if (standings.length === 0) return <EmptyState text="هنوز تیمی اضافه نشده." />;
  return (
    <div className="rounded-xl overflow-hidden border" style={{ borderColor: "rgba(11,61,46,0.15)" }}>
      <div style={{ background: PITCH, color: CREAM }} className="grid grid-cols-[1.6rem_1fr_1.8rem_1.8rem_1.8rem_2.2rem_2.4rem] gap-1 px-2 py-2 text-[11px] items-center">
        <span></span><span>تیم</span><span className="text-center">ب</span><span className="text-center">ب.برد</span><span className="text-center">ت</span><span className="text-center">گل</span><span className="text-center" style={{ color: GOLD }}>امتیاز</span>
      </div>
      {standings.map((s, i) => (
        <div key={s.id} className="grid grid-cols-[1.6rem_1fr_1.8rem_1.8rem_1.8rem_2.2rem_2.4rem] gap-1 px-2 py-2.5 items-center border-t" style={{ borderColor: "rgba(11,61,46,0.08)", background: i % 2 === 0 ? "#fff" : "rgba(11,61,46,0.03)" }}>
          <span style={{ ...display, color: i < 3 ? PITCH : "#9CA3A3" }} className="text-lg text-center">{i + 1}</span>
          <span className="flex items-center gap-1.5 text-sm font-medium truncate" style={{ color: INK }}><span className="w-2 h-2 rounded-full shrink-0" style={{ background: s.color }} />{s.name}</span>
          <span className="text-center text-xs" style={{ color: "#6B7280" }}>{s.played}</span>
          <span className="text-center text-xs" style={{ color: "#6B7280" }}>{s.win}-{s.loss}</span>
          <span className="text-center text-xs" style={{ color: "#6B7280" }}>{s.draw}</span>
          <span className="text-center text-xs" style={{ color: "#6B7280" }}>{s.gf - s.ga}</span>
          <span style={{ ...display, background: PITCH, color: GOLD }} className="text-center text-lg rounded-md py-0.5">{s.pts}</span>
        </div>
      ))}
    </div>
  );
}

function MatchesView({ teams, matches, onAdd, onRemove, onUpdate, isAdmin }) {
  const [home, setHome] = useState("");
  const [away, setAway] = useState("");
  const nameOf = (id) => teams.find((t) => t.id === id)?.name || "؟";
  const colorOf = (id) => teams.find((t) => t.id === id)?.color || "#999";
  return (
    <div className="flex flex-col gap-3">
      {isAdmin && teams.length >= 2 && (
        <div className="bg-white rounded-xl p-3 border" style={{ borderColor: "rgba(11,61,46,0.15)" }}>
          <p className="text-xs mb-2" style={{ color: "#6B7280" }}>بازی جدید</p>
          <div className="flex items-center gap-2">
            <select value={home} onChange={(e) => setHome(e.target.value)} className="flex-1 text-sm rounded-lg px-2 py-2 border outline-none" style={{ borderColor: "rgba(11,61,46,0.2)", background: CREAM }}>
              <option value="">میزبان</option>{teams.map((t) => <option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
            <span style={{ ...display, color: PITCH }} className="text-lg">vs</span>
            <select value={away} onChange={(e) => setAway(e.target.value)} className="flex-1 text-sm rounded-lg px-2 py-2 border outline-none" style={{ borderColor: "rgba(11,61,46,0.2)", background: CREAM }}>
              <option value="">میهمان</option>{teams.map((t) => <option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
            <button onClick={() => { if (home && away && home !== away) { onAdd(home, away); setHome(""); setAway(""); } }} style={{ background: PITCH, color: GOLD }} className="p-2 rounded-lg shrink-0"><Plus size={18} /></button>
          </div>
        </div>
      )}
      {isAdmin && teams.length < 2 && <EmptyState text="برای ثبت بازی حداقل دو تیم لازم داری." />}
      {matches.length === 0 ? <EmptyState text="هنوز بازی‌ای ثبت نشده." /> : (
        <div className="flex flex-col gap-2">
          {matches.map((m) => (
            <div key={m.id} className="bg-white rounded-xl p-3 border flex items-center gap-2" style={{ borderColor: "rgba(11,61,46,0.15)" }}>
              <div className="flex-1 flex items-center justify-between gap-1">
                <span className="text-sm font-medium flex items-center gap-1.5 truncate" style={{ color: INK }}><span className="w-2 h-2 rounded-full shrink-0" style={{ background: colorOf(m.homeId) }} />{nameOf(m.homeId)}</span>
                <div className="flex items-center gap-1 shrink-0">
                  {isAdmin ? (
                    <>
                      <input type="number" value={m.homeScore} onChange={(e) => onUpdate(m.id, { homeScore: Math.max(0, +e.target.value) })} className="w-9 text-center rounded border text-sm py-1" style={{ ...display, fontSize: "18px", borderColor: "rgba(11,61,46,0.2)" }} />
                      <span style={{ color: "#9CA3A3" }}>-</span>
                      <input type="number" value={m.awayScore} onChange={(e) => onUpdate(m.id, { awayScore: Math.max(0, +e.target.value) })} className="w-9 text-center rounded border text-sm py-1" style={{ ...display, fontSize: "18px", borderColor: "rgba(11,61,46,0.2)" }} />
                    </>
                  ) : (
                    <span style={{ ...display, fontSize: "20px", color: PITCH }}>{m.played ? `${m.homeScore} - ${m.awayScore}` : "؟ - ؟"}</span>
                  )}
                </div>
                <span className="text-sm font-medium flex items-center gap-1.5 truncate" style={{ color: INK }}>{nameOf(m.awayId)}<span className="w-2 h-2 rounded-full shrink-0" style={{ background: colorOf(m.awayId) }} /></span>
              </div>
              {isAdmin && (
                <>
                  <button onClick={() => onUpdate(m.id, { played: !m.played })} className="p-1.5 rounded-md shrink-0 text-xs" style={{ background: m.played ? PITCH : "#E5E7EB", color: m.played ? GOLD : "#9CA3A3" }}>{m.played ? "پایان" : "در انتظار"}</button>
                  <button onClick={() => onRemove(m.id)} className="p-1.5 shrink-0" style={{ color: RED }}><Trash2 size={14} /></button>
                </>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function TeamsView({ teams, onAdd, onRemove, isAdmin }) {
  const [name, setName] = useState("");
  return (
    <div className="flex flex-col gap-3">
      {isAdmin && (
        <div className="flex items-center gap-2">
          <input value={name} onChange={(e) => setName(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") { onAdd(name); setName(""); } }} placeholder="نام تیم جدید" className="flex-1 text-sm rounded-lg px-3 py-2.5 border outline-none bg-white" style={{ borderColor: "rgba(11,61,46,0.2)" }} />
          <button onClick={() => { onAdd(name); setName(""); }} style={{ background: PITCH, color: GOLD }} className="p-2.5 rounded-lg shrink-0"><Plus size={18} /></button>
        </div>
      )}
      {teams.length === 0 ? <EmptyState text="هیچ تیمی نداری." /> : (
        <div className="flex flex-col gap-2">
          {teams.map((t) => (
            <div key={t.id} className="bg-white rounded-xl px-3 py-2.5 border flex items-center gap-2.5" style={{ borderColor: "rgba(11,61,46,0.15)" }}>
              <span className="w-3 h-3 rounded-full shrink-0" style={{ background: t.color }} />
              <span className="flex-1 text-sm font-medium" style={{ color: INK }}>{t.name}</span>
              {isAdmin && <button onClick={() => onRemove(t.id)} style={{ color: RED }} className="p-1"><Trash2 size={15} /></button>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function EmptyState({ text }) {
  return <div className="rounded-xl border border-dashed py-8 px-4 text-center text-sm" style={{ borderColor: "rgba(11,61,46,0.25)", color: "#6B7280" }}>{text}</div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<LeagueApp />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
